<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS · Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        /* ── RESET & BASE ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-void: #020509;
            --bg-deep: #040c18;
            --bg-card: rgba(8, 20, 45, 0.78);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.45);
            --cyan-glow: 0 0 30px rgba(0, 212, 255, 0.35), 0 0 60px rgba(0, 212, 255, 0.15);
            --green: #00ffaa;
            --green-dim: rgba(0, 255, 170, 0.45);
            --orange: #ff7043;
            --red: #ff2244;
            --gold: #ffcc44;
            --purple: #b06eff;
            --pink: #ff4488;
            --text: #e0f2ff;
            --text-secondary: rgba(224, 242, 255, 0.55);
            --text-muted: rgba(224, 242, 255, 0.28);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --trans-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --trans-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg-void);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── BACKGROUND ── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: linear-gradient(rgba(0, 212, 255, 0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.022) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* ── SCAN LINE OVERLAY ── */
        .scan-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 212, 255, 0.015) 2px,
                    rgba(0, 212, 255, 0.015) 3px);
            animation: scanMove 6s linear infinite;
        }

        @keyframes scanMove {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 100px;
            }
        }

        /* ── LOGIN CONTAINER ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            animation: floatIn 0.9s var(--trans-spring) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.98);
        }

        @keyframes floatIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── GLASS PANEL ── */
        .glass-panel {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(28px) saturate(1.6);
            -webkit-backdrop-filter: blur(28px) saturate(1.6);
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s var(--trans-smooth),
                box-shadow 0.4s var(--trans-smooth);
            padding: 40px 36px 44px;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--cyan-dim) 30%, var(--green-dim) 70%, transparent 100%);
            opacity: 0.5;
        }

        .glass-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0, 212, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .glass-panel:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(0, 212, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        /* ── CORNER ACCENTS ── */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            opacity: 0.5;
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            transition: all 0.3s;
        }

        .corner::before {
            width: 100%;
            height: 1.5px;
            top: 0;
            left: 0;
        }

        .corner::after {
            width: 1.5px;
            height: 100%;
            top: 0;
            left: 0;
        }

        .corner.tl {
            top: 14px;
            left: 14px;
        }

        .corner.tr {
            top: 14px;
            right: 14px;
            transform: scaleX(-1);
        }

        .corner.bl {
            bottom: 14px;
            left: 14px;
            transform: scaleY(-1);
        }

        .corner.br {
            bottom: 14px;
            right: 14px;
            transform: scale(-1);
        }

        .glass-panel:hover .corner::before,
        .glass-panel:hover .corner::after {
            box-shadow: 0 0 16px var(--cyan), 0 0 32px rgba(0, 212, 255, 0.3);
            opacity: 1;
        }

        /* ── LOGO ── */
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-main {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--green) 55%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 28px rgba(0, 212, 255, 0.3));
            display: inline-block;
        }

        .login-logo .logo-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 6px;
        }

        .login-logo .logo-tagline {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.7;
        }

        /* ── STATUS DOT ── */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 12px var(--green);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ── FORM ── */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2.5px;
            color: var(--cyan);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-label .label-icon {
            font-size: 14px;
        }

        .field-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: var(--radius-xs);
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            width: 100%;
        }

        .field-input:focus {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08), 0 0 24px rgba(0, 212, 255, 0.06);
            background: rgba(0, 20, 40, 0.5);
        }

        .field-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 13px;
        }

        .field-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(0, 20, 40, 0.6) inset !important;
            -webkit-text-fill-color: var(--text) !important;
        }

        /* ── PASSWORD ROW ── */
        .password-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .password-row .field-label {
            margin-bottom: 0;
        }

        .forgot-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            border: none;
            background: none;
            padding: 0;
        }

        .forgot-link:hover {
            color: var(--cyan);
        }

        /* ── CHECKBOX ── */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 2px;
        }

        .checkbox-row input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 17px;
            height: 17px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .checkbox-row input[type="checkbox"]:checked {
            background: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-dim);
        }

        .checkbox-row input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-void);
            font-size: 12px;
            font-weight: 700;
        }

        .checkbox-row label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Sora', sans-serif;
        }

        /* ── CTA ── */
        .cta-btn {
            position: relative;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 255, 170, 0.08));
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: var(--radius-sm);
            padding: 16px 32px;
            color: var(--cyan);
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.35s var(--trans-spring);
            overflow: hidden;
            text-transform: uppercase;
            width: 100%;
            margin-top: 6px;
        }

        .cta-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -100%;
            width: 60%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transform: translateY(-50%) skewX(-20deg);
            transition: left 0.5s ease;
        }

        .cta-btn:hover {
            box-shadow: var(--cyan-glow), 0 0 80px rgba(0, 212, 255, 0.06);
            transform: translateY(-3px) scale(1.02);
            border-color: var(--cyan);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.22), rgba(0, 255, 170, 0.12));
        }

        .cta-btn:hover::after {
            left: 150%;
        }

        .cta-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        .cta-btn .btn-icon {
            margin-right: 8px;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 16px 0 6px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }

        .divider-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── SIGN UP ROW ── */
        .signup-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .signup-row span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .signup-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 1.5px;
            color: var(--green);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            padding: 0;
            border-bottom: 1px solid transparent;
        }

        .signup-link:hover {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
        }

        /* ── BACK LINK ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            border: none;
            background: none;
            padding: 0;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .back-link:hover {
            color: var(--cyan);
        }

        .back-link .arrow {
            transition: transform 0.2s;
        }

        .back-link:hover .arrow {
            transform: translateX(-4px);
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(4, 12, 28, 0.97);
            border: 1px solid rgba(0, 255, 170, 0.4);
            border-radius: var(--radius-sm);
            padding: 14px 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--green);
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 255, 170, 0.12);
            transition: transform 0.4s var(--trans-spring), opacity 0.4s;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 520px) {
            .login-wrapper {
                padding: 16px;
            }

            .glass-panel {
                padding: 28px 20px 32px;
                border-radius: var(--radius-sm);
            }

            .login-logo .logo-main {
                font-size: 24px;
                letter-spacing: 6px;
            }

            .login-logo .logo-sub {
                font-size: 9px;
                letter-spacing: 3px;
            }

            .cta-btn {
                font-size: 11px;
                letter-spacing: 3px;
                padding: 14px 20px;
            }

            .field-input {
                font-size: 14px;
                padding: 11px 14px;
            }

            .corner {
                width: 14px;
                height: 14px;
            }

            .corner.tl {
                top: 10px;
                left: 10px;
            }

            .corner.tr {
                top: 10px;
                right: 10px;
            }

            .corner.bl {
                bottom: 10px;
                left: 10px;
            }

            .corner.br {
                bottom: 10px;
                right: 10px;
            }
        }

        @media (max-width: 400px) {
            .glass-panel {
                padding: 20px 14px 24px;
            }

            .login-logo .logo-main {
                font-size: 20px;
                letter-spacing: 4px;
            }

            .password-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .checkbox-row label {
                font-size: 12px;
            }
        }

        /* ── KEYBOARD HINT ── */
        .hint {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-align: center;
            margin-top: 16px;
            opacity: 0.5;
        }

        .hint kbd {
            display: inline-block;
            padding: 1px 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-secondary);
        }

        /* ── SHAKE ANIMATION ── */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* ── LOADER SPINNER (inline) ── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 212, 255, 0.15);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── FLOATING PARTICLES (bg) ── */
        .particle-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle-bg .p {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--cyan);
            border-radius: 50%;
            opacity: 0.15;
            animation: floatP 12s infinite linear;
        }

        @keyframes floatP {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 0.2;
            }

            90% {
                opacity: 0.2;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- BACKGROUNDS -->
    <canvas id="bg-canvas"></canvas>
    <div class="grid-overlay"></div>
    <div class="grain"></div>
    <div class="scan-overlay"></div>

    <!-- FLOATING PARTICLES -->
    <div class="particle-bg" id="particle-bg"></div>

    <!-- TOAST -->
    <div class="toast" id="toast">✓ Welcome back, Agent.</div>

    <!-- LOGIN WRAPPER -->
    <div class="login-wrapper">

        <div class="glass-panel">

            <!-- Corners -->
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-main">NEXUS</div>
                <div class="logo-sub">Advanced Life Trajectory Simulator</div>
                <div class="logo-tagline">Secure · Encrypted · v6.0</div>
            </div>

            <!-- Status -->
            <div class="status-row">
                <div class="status-dot"></div>
                <span class="status-text">System Online · Ready</span>
            </div>

            <!-- Form -->
            <form class="login-form" id="login-form" autocomplete="on">

                <!-- Name (sign-up only) -->
                <div class="field-group" id="name-group" style="display:none;">
                    <div class="field-label">
                        <span class="label-icon">★</span> Agent Name
                    </div>
                    <input class="field-input" type="text" id="name" placeholder="Your full name" autocomplete="name">
                </div>

                <!-- Email -->
                <div class="field-group">
                    <div class="field-label">
                        <span class="label-icon">▸</span> Email Address
                    </div>
                    <input class="field-input" type="email" id="email" placeholder="agent@nexus.sim"
                        required autofocus>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <div class="password-row">
                        <div class="field-label">
                            <span class="label-icon">◆</span> Password
                        </div>
                        <button type="button" class="forgot-link" id="forgot-btn">Forgot?</button>
                    </div>
                    <input class="field-input" type="password" id="password" placeholder="••••••••"
                        required>
                </div>

                <!-- Remember + Actions -->
                <div class="checkbox-row" id="remember-row">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">Remember this device</label>
                </div>

                <!-- Submit -->
                <button type="submit" class="cta-btn" id="login-btn">
                    <span class="btn-icon">⚡</span> <span id="login-btn-text">Access Nexus</span>
                </button>

            </form>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or</span>
                <div class="divider-line"></div>
            </div>

            <!-- Sign Up -->
            <div class="signup-row" id="signup-row">
                <span>New to Nexus?</span>
                <button class="signup-link" id="signup-btn">Create Account →</button>
            </div>

            <!-- Back -->
            <div style="display:flex;justify-content:center;">
                <button class="back-link" id="back-btn">
                    <span class="arrow">←</span> Return to Simulator
                </button>
            </div>

            <!-- Hint -->
            <div class="hint" id="form-hint">
                Don't have an account? Create one — press <kbd>↵</kbd> to login
            </div>

        </div>

    </div>

    <script>
        // ── BACKGROUND STARS ──
        (function () {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            for (let i = 0; i < 90; i++) {
                particles.push({
                    x: Math.random() * 1920,
                    y: Math.random() * 1080,
                    r: Math.random() * 1.8 + 0.2,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: (Math.random() - 0.5) * 0.25,
                    alpha: Math.random() * 0.5 + 0.08,
                    color: Math.random() > 0.6 ? '0,212,255' : '0,255,170'
                });
            }

            const orbs = [
                { x: 0.1, y: 0.15, r: 0.4, c: 'rgba(0,80,180,0.06)', phase: 0 },
                { x: 0.9, y: 0.8, r: 0.35, c: 'rgba(0,160,100,0.04)', phase: 1.8 },
                { x: 0.5, y: 0.4, r: 0.3, c: 'rgba(80,0,180,0.035)', phase: 3.2 }
            ];

            let t = 0;

            function draw() {
                ctx.clearRect(0, 0, W, H);
                t += 0.003;

                orbs.forEach(o => {
                    const ox = W * (o.x + Math.sin(t + o.phase) * 0.05);
                    const oy = H * (o.y + Math.cos(t * 0.6 + o.phase) * 0.05);
                    const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, Math.min(W, H) * o.r);
                    g.addColorStop(0, o.c);
                    g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, W, H);
                });

                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = W;
                    if (p.x > W) p.x = 0;
                    if (p.y < 0) p.y = H;
                    if (p.y > H) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color},${p.alpha * (0.6 + Math.sin(t * 1.5 + p.x * 0.01) * 0.4)})`;
                    ctx.fill();
                });

                // faint connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 110) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(0,212,255,${0.035 * (1 - d / 110)})`;
                            ctx.lineWidth = 0.4;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ── FLOATING PARTICLES (foreground) ──
        (function () {
            const container = document.getElementById('particle-bg');
            for (let i = 0; i < 16; i++) {
                const p = document.createElement('div');
                p.className = 'p';
                const size = 1 + Math.random() * 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 16) + 's';
                p.style.animationDelay = (Math.random() * 12) + 's';
                p.style.opacity = 0.05 + Math.random() * 0.15;
                p.style.background = Math.random() > 0.5 ? 'var(--cyan)' : 'var(--green)';
                container.appendChild(p);
            }
        })();

        // ── TOAST ──
        function showToast(msg, color = 'green') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderColor = color === 'green' ? 'rgba(0,255,170,0.4)' :
                color === 'cyan' ? 'rgba(0,212,255,0.4)' :
                    'rgba(255,112,67,0.4)';
            t.style.color = color === 'green' ? 'var(--green)' :
                color === 'cyan' ? 'var(--cyan)' :
                    'var(--orange)';
            t.classList.add('show');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => t.classList.remove('show'), 3200);
        }

        // ── AUTH LOGIC (real backend: Express + Supabase) ──
        const form = document.getElementById('login-form');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const loginBtnText = document.getElementById('login-btn-text');
        const forgotBtn = document.getElementById('forgot-btn');
        const signupBtn = document.getElementById('signup-btn');
        const backBtn = document.getElementById('back-btn');
        const signupRow = document.getElementById('signup-row');
        const formHint = document.getElementById('form-hint');

        // Same-origin API base (works once deployed on Vercel, or via `npm run dev` locally)
        const API_BASE = window.location.origin;

        let mode = 'login'; // 'login' | 'signup'

        function setMode(next) {
            mode = next;
            if (mode === 'signup') {
                nameGroup.style.display = '';
                nameInput.required = true;
                loginBtnText.textContent = 'Create Account';
                signupRow.innerHTML = '<span>Already registered?</span>';
                const switchBtn = document.createElement('button');
                switchBtn.className = 'signup-link';
                switchBtn.id = 'signup-btn';
                switchBtn.textContent = 'Log In →';
                signupRow.appendChild(switchBtn);
                switchBtn.addEventListener('click', () => setMode('login'));
                formHint.textContent = 'Fill in your name, email & password, then press ↵';
            } else {
                nameGroup.style.display = 'none';
                nameInput.required = false;
                loginBtnText.textContent = 'Access Nexus';
                signupRow.innerHTML = '<span>New to Nexus?</span>';
                const switchBtn = document.createElement('button');
                switchBtn.className = 'signup-link';
                switchBtn.id = 'signup-btn';
                switchBtn.textContent = 'Create Account →';
                signupRow.appendChild(switchBtn);
                switchBtn.addEventListener('click', () => setMode('signup'));
                formHint.textContent = "Don't have an account? Create one — press ↵ to login";
            }
        }

        // Initial binding for the sign-up button rendered in the HTML
        signupBtn.addEventListener('click', () => setMode('signup'));

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            loginBtn.style.opacity = isLoading ? '0.7' : '1';
            if (isLoading) {
                loginBtn._prevText = loginBtnText.textContent;
                loginBtnText.innerHTML = '<span class="spinner"></span> ' +
                    (mode === 'signup' ? 'Creating account…' : 'Authenticating…');
            } else {
                loginBtnText.textContent = loginBtn._prevText || (mode === 'signup' ? 'Create Account' : 'Access Nexus');
            }
        }

        function shakeForm() {
            const panel = document.querySelector('.glass-panel');
            panel.classList.add('shake');
            setTimeout(() => panel.classList.remove('shake'), 500);
        }

        async function doSignup(name, email, pass) {
            setLoading(true);
            try {
                const resp = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password: pass })
                });
                const data = await resp.json();
                setLoading(false);

                if (!resp.ok) {
                    showToast('✗ ' + (data.error || 'Could not create account.'), 'orange');
                    shakeForm();
                    return;
                }

                showToast('✓ Account created! Logging you in…', 'green');
                // Immediately log the new user in so the session is established
                await doLogin(email, pass, true);
            } catch (err) {
                setLoading(false);
                showToast('✗ Network error — is the server running?', 'orange');
                shakeForm();
            }
        }

        async function doLogin(email, pass, skipLoadingToggle) {
            if (!skipLoadingToggle) setLoading(true);
            try {
                const resp = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await resp.json();
                if (!skipLoadingToggle) setLoading(false);

                if (!resp.ok) {
                    showToast('✗ ' + (data.error || 'Invalid credentials.'), 'orange');
                    shakeForm();
                    emailInput.style.borderColor = 'var(--red)';
                    passInput.style.borderColor = 'var(--red)';
                    setTimeout(() => {
                        emailInput.style.borderColor = '';
                        passInput.style.borderColor = '';
                    }, 1200);
                    return;
                }

                // Persist session so the main simulator can show the real registered name
                localStorage.setItem('nexus_token', data.token);
                localStorage.setItem('nexus_user', JSON.stringify(data.user));

                showToast(`✓ Welcome, ${data.user.name}. Redirecting…`, 'green');
                setTimeout(() => {
                    window.location.href = 'nexus-mobile-fixed.html';
                }, 1100);
            } catch (err) {
                if (!skipLoadingToggle) setLoading(false);
                showToast('✗ Network error — is the server running?', 'orange');
                shakeForm();
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const pass = passInput.value.trim();

            if (mode === 'signup') {
                if (!name || !email || !pass) {
                    showToast('⚠ Please fill in name, email and password.', 'orange');
                    return;
                }
                if (pass.length < 6) {
                    showToast('⚠ Password must be at least 6 characters.', 'orange');
                    return;
                }
                doSignup(name, email, pass);
            } else {
                if (!email || !pass) {
                    showToast('⚠ Please fill in both fields.', 'orange');
                    return;
                }
                doLogin(email, pass);
            }
        });

        // Forgot password
        forgotBtn.addEventListener('click', () => {
            showToast('📧 Password reset isn\'t wired up yet — contact support.', 'cyan');
        });

        // Back to simulator (only if already logged in)
        backBtn.addEventListener('click', () => {
            const tok = localStorage.getItem('nexus_token');
            if (tok) {
                window.location.href = 'nexus-mobile-fixed.html';
            } else {
                window.location.href = 'effect.html';
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') backBtn.click();
        });

        // Auto-focus on load
        window.addEventListener('load', () => {
            setTimeout(() => emailInput.focus(), 400);
        });

        // If already logged in, skip login page and go to app
        (function() {
            const tok = localStorage.getItem('nexus_token');
            const usr = localStorage.getItem('nexus_user');
            if (tok && usr) {
                window.location.replace('nexus-mobile-fixed.html');
            }
        })();

        setMode('login');
        console.log('🔐 NEXUS Login · real auth via /api/login and /api/register');
    </script>

</body>

</html>
